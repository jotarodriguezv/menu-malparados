<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Malparados — Menú Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ffd521;
      --dark: #0a0a0a;
      --surface: #1a1a1a;
      --card: #252525;
      --border: #333333;
      --text: #ffffff;
      --text-muted: #b0b0b0;
      --accent: #ffd521;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--dark);
      /* FONDO INFINITO MÓVIL AJUSTADO: 
         - background-size: 100% auto = adapta al ancho de pantalla, altura proporcional
         - repeat-y = se repite hacia abajo infinitamente
         - scroll = se mueve con el contenido
      */
      background-image: url('imgs/fondo.png');
      background-size: 100% auto;
      background-position: center top;
      background-repeat: repeat-y;
      background-attachment: scroll;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Overlay oscuro sobre el fondo para legibilidad */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.85);
      z-index: -1;
      pointer-events: none;
    }

    .header, .nav-sticky, .main, .footer {
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--surface);
      border-bottom: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      box-shadow: 0 0 15px rgba(255, 213, 33, 0.2);
    }

    .menu-toggle {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      transition: transform 0.2s;
    }

    .menu-toggle:active {
      transform: scale(0.95);
    }

    .menu-toggle span {
      display: block;
      width: 24px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
      box-shadow: 0 0 5px var(--primary);
    }

    .logo-header {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--primary);
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--primary), 0 0 20px rgba(255, 213, 33, 0.6);
    }

    /* ── SIDEBAR MENU ── */
    .sidebar {
      position: fixed;
      left: -100%;
      top: 0;
      width: 75%;
      max-width: 300px;
      height: 100vh;
      background: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(10px);
      border-right: 2px solid var(--primary);
      z-index: 200;
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      padding-top: 60px;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--primary);
      text-transform: uppercase;
      text-shadow: 0 0 8px var(--primary);
    }

    .close-menu {
      background: none;
      border: none;
      color: var(--text);
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .close-menu:active {
      transform: scale(0.95);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
    }

    .sidebar-link {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      border-left: none;
      border-right: none;
      border-top: none;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }

    /* EFECTO DE RESALTADO EN SIDEBAR */
    .sidebar-link:hover,
    .sidebar-link:active,
    .sidebar-link.active {
      background: rgba(255, 213, 33, 0.15);
      color: var(--primary);
      border-left: 4px solid var(--primary);
      padding-left: 16px;
      text-shadow: 0 0 5px rgba(255, 213, 33, 0.5);
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── MAIN CONTENT ── */
    .main {
      margin-top: 60px;
      padding: 20px 12px 80px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px 0;
    }

    .hero-logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 16px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px var(--primary));
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 3px;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 0 15px var(--primary), 0 0 30px rgba(255, 213, 33, 0.4);
    }

    .hero-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── CATEGORÍA SECCIÓN ── */
    .category-section {
      margin-bottom: 40px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .category-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: var(--primary);
      text-transform: uppercase;
      text-shadow: 0 0 5px rgba(255, 213, 33, 0.5);
    }

    .category-line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
      box-shadow: 0 0 5px var(--primary);
    }

    /* ── GRID PRODUCTOS ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
    }

    /* ── CARD PRODUCTO ── */
    .product-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    /* EFECTO DE RESALTADO EN TARJETAS */
    .product-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 12px rgba(255, 213, 33, 0.4), inset 0 0 8px rgba(255, 213, 33, 0.1);
      transform: translateY(-2px);
    }

    .product-card:active {
      transform: scale(0.97);
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(255, 213, 33, 0.6), inset 0 0 10px rgba(255, 213, 33, 0.2);
    }

    .card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--surface);
      overflow: hidden;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .product-card:hover .card-img {
      transform: scale(1.05);
    }

    .card-body {
      padding: 12px;
    }

    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 4px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .product-card:hover .card-name {
      color: var(--primary);
      text-shadow: 0 0 5px rgba(255, 213, 33, 0.4);
    }

    .card-price {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }

    /* ── LISTA PRODUCTOS (sin imágenes) ── */
    .products-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      padding: 14px 16px;
      transition: all 0.2s;
      cursor: pointer;
    }

    /* EFECTO DE RESALTADO EN LISTA */
    .list-item:hover {
      background: rgba(255, 213, 33, 0.1);
      border-left: 3px solid var(--primary);
      padding-left: 13px;
    }

    .list-item:active {
      background: rgba(255, 213, 33, 0.2);
      box-shadow: inset 0 0 8px rgba(255, 213, 33, 0.3);
    }

    .list-name {
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .list-item:hover .list-name {
      color: var(--primary);
    }

    .list-price {
      color: var(--primary);
      font-weight: 700;
    }

    /* ── MODAL PRODUCTO ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-sheet {
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateY(20px);
      transition: transform 0.3s ease;
      margin: 16px;
      border: 1px solid var(--border);
    }

    @media (max-width: 767px) {
      .modal-overlay { align-items: flex-end; }
      .modal-sheet {
        margin: 0;
        max-width: 100%;
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
      }
      .modal-overlay.open .modal-sheet { transform: translateY(0); }
    }

    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }

    .modal-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--card);
      flex-shrink: 0;
      overflow: hidden;
    }

    .modal-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
      transition: transform 0.3s;
    }

    .modal-img-wrap:active .modal-img {
      transform: scale(1.03);
    }

    .modal-close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--primary);
      color: var(--primary);
      font-size: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-close-btn:hover {
      background: rgba(255, 213, 33, 0.2);
      box-shadow: 0 0 10px var(--primary);
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--primary);
      border-radius: 50%;
      color: var(--primary);
      font-size: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 213, 33, 0.3);
      transition: all 0.2s;
    }

    .modal-nav:hover {
      background: rgba(255, 213, 33, 0.2);
      box-shadow: 0 0 15px var(--primary);
    }

    .modal-nav-prev { left: 10px; }
    .modal-nav-next { right: 10px; }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--primary);
      margin-bottom: 8px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 213, 33, 0.4);
    }

    .modal-price {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .modal-desc {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .modal-counter {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 16px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox img {
      max-width: 95vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid var(--primary);
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--primary);
      color: var(--primary);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .lightbox-close:hover {
      background: rgba(255, 213, 33, 0.2);
      box-shadow: 0 0 10px var(--primary);
    }

    /* ── PROMO MODAL ── */
    .promo-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .promo-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .promo-box {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      border: 2px solid var(--primary);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(255, 213, 33, 0.3);
    }

    .promo-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 90vh;
    }

    .promo-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--primary);
      color: var(--primary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .promo-close:hover {
      background: rgba(255, 213, 33, 0.2);
      box-shadow: 0 0 10px var(--primary);
    }

    /* ── SCROLL TOP ── */
    .scroll-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      color: var(--dark);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 90;
      box-shadow: 0 0 15px var(--primary);
    }

    .scroll-top.visible {
      opacity: 1;
      pointer-events: all;
    }

    .scroll-top:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px var(--primary);
    }

    .scroll-top:active {
      transform: scale(0.95);
    }

    .footer {
      text-align: center;
      padding: 30px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <button class="menu-toggle" id="menuToggle">
      <span></span><span></span><span></span>
    </button>
    <div class="logo-header">MALPARADOS</div>
    <div style="width: 40px;"></div>
  </div>

  <!-- SIDEBAR MENU -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Menú</div>
      <button class="close-menu" id="closeMenu">✕</button>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </div>

  <div class="overlay" id="overlay"></div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="hero">
      <img src="imgs/logo.jpg" alt="Malparados" class="hero-logo">
      <div class="hero-title">MALPARADOS</div>
      <div class="hero-subtitle">Sabor sin reglas, actitud sin límites</div>
    </div>
    <div id="mainContent"></div>
  </div>

  <div class="footer">© 2026 MALPARADOS · Todos los derechos reservados</div>

  <button class="scroll-top" id="scrollTop">↑</button>

  <!-- MODAL PRODUCTO -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal-sheet" id="modalSheet">
      <div class="modal-img-wrap" id="modalImgWrap">
        <button class="modal-close-btn" onclick="closeModal()">✕</button>
        <button class="modal-nav modal-nav-prev" id="modalPrev" onclick="navigateModal(-1)">‹</button>
        <button class="modal-nav modal-nav-next" id="modalNext" onclick="navigateModal(1)">›</button>
      </div>
      <div class="modal-body">
        <div class="modal-name" id="modalName"></div>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-counter" id="modalCounter"></div>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close">✕</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <!-- PROMO MODAL -->
  <div class="promo-overlay" id="promoOverlay">
    <div class="promo-box">
      <img src="imgs/promo.jpg" alt="Promoción" class="promo-img" onerror="closePromo()">
      <button class="promo-close" onclick="closePromo()">✕</button>
    </div>
  </div>

  <script>
    const CONFIG = {
      restaurante: "Malparados",
      promo: { activa: true, imagen: "imgs/promo.jpg" },
      categorias: [
        { id: "hamburguesas", label: "Hamburguesas" },
        { id: "hotdogs", label: "Hot Dogs" },
        { id: "papas_locas", label: "Papas Locas" },
        { id: "combos", label: "Combos" },
        { id: "desgranados", label: "Desgranados" },
        { id: "alitas", label: "Alitas" },
        { id: "entradas", label: "Entradas" },
        { id: "bowls", label: "Bowls" },
        { id: "bebidas", label: "Bebidas" },
        { id: "adicionales", label: "Adicionales" }
      ],
      sinFotos: ["adicionales", "bebidas"]
    };

    let menuData = [];
    let currentCategoryProducts = [];
    let currentProductIndex = 0;

    async function init() {
      try {
        const res = await fetch('menu.json');
        menuData = await res.json();
      } catch (e) { console.warn('menu.json no encontrado'); menuData = []; }
      buildSidebar();
      buildMenu();
      initScrollEffects();
      if (CONFIG.promo.activa) setTimeout(() => openPromo(), 800);
    }

    function buildSidebar() {
      const nav = document.getElementById('sidebarNav');
      CONFIG.categorias.forEach((cat) => {
        const productos = menuData.filter(p => p.categoria === cat.id);
        if (productos.length === 0) return;
        const link = document.createElement('button');
        link.className = 'sidebar-link';
        link.textContent = cat.label;
        link.onclick = () => {
          document.getElementById('sec-' + cat.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          closeSidebar();
        };
        nav.appendChild(link);
      });
    }

    function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }

    function buildMenu() {
      const main = document.getElementById('mainContent');
      main.innerHTML = '';
      CONFIG.categorias.forEach(cat => {
        const productos = menuData.filter(p => p.categoria === cat.id).sort((a, b) => (a.precioNumerico || 0) - (b.precioNumerico || 0));
        if (productos.length === 0) return;
        const section = document.createElement('div');
        section.className = 'category-section';
        section.id = 'sec-' + cat.id;
        section.innerHTML = `<div class="category-header"><div class="category-title">${cat.label}</div><div class="category-line"></div></div>`;
        if (CONFIG.sinFotos.includes(cat.id)) {
          const list = document.createElement('div');
          list.className = 'products-list';
          productos.forEach(p => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<span class="list-name">${p.nombre}</span><span class="list-price">${p.precio}</span>`;
            list.appendChild(item);
          });
          section.appendChild(list);
        } else {
          const grid = document.createElement('div');
          grid.className = 'products-grid';
          productos.forEach((p, idx) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => openModal(cat.id, idx);
            const imgHtml = p.imagen ? `<img class="card-img" src="${p.imagen}" alt="${p.nombre}" loading="lazy">` : `<div class="no-img-placeholder">🚫</div>`;
            card.innerHTML = `<div class="card-img-wrap">${imgHtml}</div><div class="card-body"><div class="card-name">${p.nombre}</div><div class="card-price">${p.precio}</div></div>`;
            grid.appendChild(card);
          });
          section.appendChild(grid);
        }
        main.appendChild(section);
      });
    }

    function openModal(catId, idx) {
      const productos = menuData.filter(p => p.categoria === catId).sort((a, b) => (a.precioNumerico || 0) - (b.precioNumerico || 0));
      currentCategoryProducts = productos;
      currentProductIndex = idx;
      renderModal();
      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function renderModal() {
      const p = currentCategoryProducts[currentProductIndex];
      const wrap = document.getElementById('modalImgWrap');
      const oldImg = wrap.querySelector('.modal-img, .no-img-placeholder');
      if (oldImg) oldImg.remove();
      if (p.imagen) {
        const img = document.createElement('img');
        img.className = 'modal-img'; img.src = p.imagen;
        img.onclick = () => openLightbox(p.imagen);
        wrap.insertAdjacentElement('afterbegin', img);
      } else {
        wrap.insertAdjacentHTML('afterbegin', '<div class="no-img-placeholder">🚫</div>');
      }
      document.getElementById('modalName').textContent = p.nombre;
      document.getElementById('modalPrice').textContent = p.precio;
      document.getElementById('modalDesc').textContent = p.descripcion || '';
      const total = currentCategoryProducts.length;
      document.getElementById('modalCounter').textContent = `${currentProductIndex + 1} / ${total}`;
      document.getElementById('modalPrev').style.visibility = currentProductIndex === 0 ? 'hidden' : 'visible';
      document.getElementById('modalNext').style.visibility = currentProductIndex === total - 1 ? 'hidden' : 'visible';
    }

    function navigateModal(dir) {
      const next = currentProductIndex + dir;
      if (next >= 0 && next < currentCategoryProducts.length) {
        currentProductIndex = next;
        renderModal();
      }
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
    function handleOverlayClick(e) { if (e.target.id === 'modalOverlay') closeModal(); }

    function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('open'); }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

    function openPromo() { document.getElementById('promoOverlay').classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closePromo() { document.getElementById('promoOverlay').classList.remove('open'); document.body.style.overflow = ''; }

    function initScrollEffects() {
      const btn = document.getElementById('scrollTop');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('visible', window.scrollY > 300);
      }, { passive: true });
      btn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('menuToggle').onclick = openSidebar;
    document.getElementById('closeMenu').onclick = closeSidebar;
    document.getElementById('overlay').onclick = closeSidebar;

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeLightbox(); closePromo(); closeSidebar(); }
      if (document.getElementById('modalOverlay').classList.contains('open')) {
        if (e.key === 'ArrowRight') navigateModal(1);
        if (e.key === 'ArrowLeft') navigateModal(-1);
      }
    });

    // Swipe en modal
    let touchStartX = 0;
    document.getElementById('modalSheet').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.getElementById('modalSheet').addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) navigateModal(diff > 0 ? 1 : -1);
    });

    init();
  </script>
</body>
</html>
